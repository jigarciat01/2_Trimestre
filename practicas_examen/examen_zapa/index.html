<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SneakerDrop</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; text-align: center; }
        .controls { margin: 20px; padding: 20px; background: white; border-radius: 8px; }
        
        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }

        /* Estilo de la tarjeta */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .emoji { font-size: 4rem; margin: 0; }
        .agotado { opacity: 0.6; filter: grayscale(1); }
        .stock-badge { background: #333; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .btn-buy { 
            background: #ff4757; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 10px; width: 100%;
        }
        .btn-buy:disabled { background: #ccc; cursor: not-allowed; }
    </style>
    <script type="module" src="main.js"></script>
</head>
<body>
    <h1>👟 SneakerDrop Stock</h1>
    
    <div class="controls">
        <button id="btn-load">Cargar Catálogo</button>
        <label>Filtrar por Marca:</label>
        <select id="filter-brand">
            <option value="all">Todas</option>
            <option value="Nike">Nike</option>
            <option value="Adidas">Adidas</option>
            <option value="New Balance">New Balance</option>
        </select>
    </div>

    <div id="grid"></div>
</body>
</html>
