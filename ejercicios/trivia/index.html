<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Trivial Full-Stack - Un juego de preguntas y respuestas dinámico y moderno.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer></script>
	<title>Trivial Full-Stack: 7 Categorías</title>
</head>
<body>
	<div class="bg-orb orb-1"></div>
	<div class="bg-orb orb-2"></div>
	<div class="bg-orb orb-3"></div>

	<header class="glass-panel main-header">
		<h1>🏆 Trivial Full-Stack</h1>

		<div class="header-turno-container">
			<div id="indicador-turno" class="turno-indicador">Esperando jugadores...</div>
		</div>

		<div class="estado-juego">
			<div class="puntos-container">
				<h2>Puntos</h2>
				<span id="puntos-display" class="puntos-valor">0</span>
			</div>

			<div class="progreso-wrapper">
				<div class="progreso-quesitos">
					<div class="tema-progreso"><div id="q-geografia" class="quesito-icono geografia"></div><span>Geo</span></div>
					<div class="tema-progreso"><div id="q-entretenimiento" class="quesito-icono entretenimiento"></div><span>Ent</span></div>
					<div class="tema-progreso"><div id="q-historia" class="quesito-icono historia"></div><span>Hist</span></div>
					<div class="tema-progreso"><div id="q-arte_literatura" class="quesito-icono arte_literatura"></div><span>Arte</span></div>
					<div class="tema-progreso"><div id="q-ciencia" class="quesito-icono ciencia"></div><span>Cien</span></div>
					<div class="tema-progreso"><div id="q-deportes" class="quesito-icono deportes"></div><span>Dep</span></div>
					<div class="tema-progreso"><div id="q-videojuegos" class="quesito-icono videojuegos"></div><span>Vj</span></div>
				</div>
			</div>

			<div class="botones-header">
				<button id="btn-anadir-jugador" class="btn-primary">Añadir Jugador</button>
				<button id="btn-reiniciar" class="btn-secondary">Reiniciar Juego</button>
			</div>
		</div>
	</header>

	<main id="container">
		<div id="ruleta-wrapper">
			<div id="marcador">
				<div id="cartelGanador">
					<p id="ganadorTexto">¡Click en "GIRAR"!</p>
				</div>
			</div>
			<div id="ruleta" class="glass-ruleta">
				<div id="opcionesContainer"></div>
				<div id="sortear" class="btn-sortear"><p>GIRAR</p></div>
			</div>
		</div>

		<div id="feedback-container" class="oculto"></div>

		<div id="mensaje-victoria" class="glass-panel oculto victoria-panel">
			<h2>¡HAS GANADO!</h2>
			<p>Has conseguido todos los quesitos.</p>
		</div>
	</main>

	<dialog id="modal-pregunta" class="glass-modal">
		<div id="tituloForm">
			<p id="tema-pregunta">Tema</p>
			<div id="temporizador">20</div>
		</div>
		<div id="formContainer" class="contenedor-pregunta">
			<h3 id="texto-pregunta">Cargando...</h3>
			<div id="opciones-respuestas" class="opciones"></div>
		</div>
	</dialog>

	<footer>
		<div class="panel-inferior glass-panel">
			<div class="sala-zona" style="width: 100%;">
				<h3>Ranking de Jugadores en Partida</h3>
				<ul id="lista-sala" class="lista-sala"></ul>
			</div>
		</div>
	</footer>
</body>
</html>
